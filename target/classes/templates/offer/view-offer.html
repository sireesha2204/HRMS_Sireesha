<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Offer Letter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
        }
        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        .pdf-container {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            height: 80vh;
            border: 1px solid var(--dark-border);
        }
        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .action-bar {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-download {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
        }
        .btn-download:hover {
            background: #059669;
            color: white;
        }
        .btn-back {
            background: transparent;
            color: var(--dark-text);
            border: 1px solid var(--dark-border);
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="action-bar">
        <a href="/dashboard/hr/offer-candidates" class="btn-back">
            <i class="fas fa-arrow-left"></i> Back to List
        </a>
        <h4 style="margin: 0;">Offer Letter: <span th:text="${offer.candidateName}">Candidate</span></h4>
        <a th:href="@{/dashboard/hr/download-offer/{id}(id=${offer.id}, download=true)}" class="btn-download">
            <i class="fas fa-download"></i> Download PDF
        </a>
    </div>

    <div class="pdf-container">
        <iframe th:src="@{/dashboard/hr/download-offer/{id}(id=${offer.id})}"></iframe>
    </div>
</div>
</body>
</html>
