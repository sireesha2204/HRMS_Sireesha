<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document - HR Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === EXACT UI MATCH WITH CANDIDATE PAGE === */
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --dark-text-secondary: #cbd5e1;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .upload-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--dark-card);
            border-radius: 15px;
            padding: 2rem;
            border: 1px solid var(--dark-border);
        }

        .btn-primary {
            background: var(--primary);
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-outline-secondary {
            border-color: var(--dark-border);
            color: var(--dark-text-secondary);
        }

        .btn-outline-secondary:hover {
            background: var(--dark-border);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        /* === SUCCESS MESSAGE - GREEN TEXT === */
        .simple-message {
            margin: 10px 0;
            padding: 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .simple-message.success {
            color: var(--success-color);
        }

        .simple-message.error {
            color: var(--error-color);
        }

        .simple-message.info {
            color: var(--primary);
        }

        /* === FILE INFO DISPLAY === */
        .file-info {
            margin-top: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-info .file-name {
            color: var(--dark-text);
        }

        .file-info .file-name.valid {
            color: var(--success-color);
        }

        .file-info .file-name.invalid {
            color: var(--error-color);
        }

        .file-info .file-size {
            color: var(--dark-text-secondary);
            font-size: 12px;
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-text);
            margin-bottom: 8px;
        }

        .form-control {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
        }

        .form-control:focus {
            background: rgba(30, 41, 59, 0.7);
            border-color: var(--primary);
            color: var(--dark-text);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .form-text {
            color: var(--dark-text-secondary);
            font-size: 12px;
            margin-top: 4px;
        }

        /* === REMOVE ALERT MESSAGES (replaced with simple-message) === */
        .alert {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="upload-container">
    <div class="text-center mb-4">
        <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
        <h2 class="h4">HR Document Upload</h2>
        <p class="text-muted">
            Uploading <strong><span th:text="${documentName}">Document</span></strong><br>
            For: <span th:text="${employee.firstName + ' ' + employee.lastName}">Employee</span>
        </p>
    </div>

    <!-- === GREEN SUCCESS MESSAGE - SAME AS CANDIDATE === -->
    <div th:if="${success}" class="simple-message success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${success}"></span>
    </div>

    <!-- === RED ERROR MESSAGE - SAME AS CANDIDATE === -->
    <div th:if="${error}" class="simple-message error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Upload Form -->
    <form th:action="@{/onboarding/employee/{empId}/upload/{docType}(empId=${employee.employeeId}, docType=${documentType})}"
          method="post" enctype="multipart/form-data" id="uploadForm">

        <!-- HR User Identity Field -->
        <input type="hidden" name="uploadedBy" th:value="${session.hrUserName != null ? session.hrUserName : 'HR_ADMIN'}">

        <div class="mb-4">
            <label for="documentFile" class="form-label">Select File</label>
            <input type="file" class="form-control" id="documentFile" name="documentFile" required
                   accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
            <div class="form-text">
                <i class="fas fa-info-circle me-1"></i>
                Max size: 5MB. Formats: PDF, DOC, DOCX, JPG, PNG
            </div>

            <!-- === FILE INFO DISPLAY - SAME AS CANDIDATE === -->
            <div id="fileInfo" class="file-info" style="display: none;">
                <i class="fas fa-file" id="fileIcon"></i>
                <span id="fileNameText" class="file-name"></span>
                <span id="fileSizeText" class="file-size"></span>
            </div>

            <!-- === VALIDATION MESSAGE - SAME AS CANDIDATE === -->
            <div id="validationMessage" class="simple-message" style="display: none;"></div>
        </div>

        <div class="mb-4">
            <label for="notes" class="form-label">HR Verification Notes (Optional)</label>
            <textarea class="form-control" id="notes" name="notes" rows="3"
                      placeholder="Enter any verification notes..."></textarea>
        </div>

        <div class="d-flex justify-content-between pt-2">
            <a th:href="@{/onboarding/employee/{empId}(empId=${employee.employeeId})}"
               class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Cancel
            </a>
            <button type="submit" class="btn btn-primary px-4" id="submitBtn">
                <i class="fas fa-upload me-2"></i>Upload & Verify
            </button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const fileInput = document.getElementById('documentFile');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameText = document.getElementById('fileNameText');
        const fileSizeText = document.getElementById('fileSizeText');
        const fileIcon = document.getElementById('fileIcon');
        const validationMessage = document.getElementById('validationMessage');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('uploadForm');

        // File validation constants
        const validExtensions = ['.pdf', '.doc', '.docx', '.jpg', '.jpeg', '.png'];
        const maxSize = 5 * 1024 * 1024; // 5MB

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Show file info
            fileInfo.style.display = 'flex';
            validationMessage.style.display = 'flex';

            const fileName = file.name.toLowerCase();
            const fileExt = fileName.substring(fileName.lastIndexOf('.'));
            const isValidExtension = validExtensions.includes(fileExt);

            // Display file info
            fileNameText.textContent = file.name;
            fileNameText.className = isValidExtension ? 'file-name valid' : 'file-name invalid';
            fileSizeText.textContent = formatFileSize(file.size);
            fileIcon.className = isValidExtension ? 'fas fa-file text-success' : 'fas fa-file text-danger';

            // Show validation
            if (file.size > maxSize) {
                showValidation('File size exceeds 5MB limit', 'error');
                fileNameText.className = 'file-name invalid';
                fileIcon.className = 'fas fa-file text-danger';
            } else if (isValidExtension) {
                showValidation('File type is valid', 'success');
            } else {
                showValidation('Invalid file type', 'error');
            }
        });

        form.addEventListener('submit', function(e) {
            const file = fileInput.files[0];
            if (!file) {
                e.preventDefault();
                showValidation('Please select a file', 'error');
                return;
            }

            if (file.size > maxSize) {
                e.preventDefault();
                showValidation('File size exceeds 5MB limit', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Uploading...';
        });

        function showValidation(message, type) {
            validationMessage.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            validationMessage.className = `simple-message ${type}`;
            validationMessage.style.display = 'flex';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return `(${bytes} bytes)`;
            else if (bytes < 1048576) return `(${(bytes / 1024).toFixed(1)} KB)`;
            else return `(${(bytes / 1048576).toFixed(1)} MB)`;
        }
    });
</script>
</body>
</html>
