<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --dark-text-secondary: #cbd5e1;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center; /* Ensures perfect centering */
            padding: 15px;
            margin: 0;
            overflow-y: auto; /* Allows smooth scroll only if absolutely necessary */
        }

        .login-container {
            max-width: 400px; /* Slightly tightened width for better proportions */
            width: 100%;
            margin: auto;
        }

        .login-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
            padding: 0.65rem 1rem; /* Slightly reduced height */
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            color: var(--dark-text);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-label {
            font-weight: 500;
            color: var(--dark-text-secondary);
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.65rem; /* Slightly reduced height */
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .alert {
            border-radius: 8px;
            border: none;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .alert-success { background: rgba(16, 185, 129, 0.15); border-left: 4px solid var(--success); color: #a7f3d0; }
        .alert-danger { background: rgba(239, 68, 68, 0.15); border-left: 4px solid var(--danger); color: #fca5a5; }
        .alert-info { background: rgba(59, 130, 246, 0.15); border-left: 4px solid var(--info); color: #93c5fd; }

        .btn-close-white { filter: invert(1) grayscale(100%) brightness(200%); }

        .form-text {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        a { text-decoration: none; transition: all 0.2s ease; }
        a:hover { opacity: 0.8; }

        /* --- RESPONSIVE ADJUSTMENTS --- */

        /* For smaller width devices (Tablets/Mobiles) */
        @media (max-width: 576px) {
            .login-card { padding: 1.5rem; }
            body { padding: 10px; }
        }

        /* For laptops with shorter screen heights to REMOVE scrolling */
        @media (max-height: 750px) {
            .login-card {
                padding: 1.25rem 1.5rem; /* Reduce card padding */
            }
            .mb-4 {
                margin-bottom: 1rem !important; /* Force smaller gaps between fields */
            }
            .mb-3 {
                margin-bottom: 0.75rem !important;
            }
            h2 {
                font-size: 1.5rem; /* Shrink title slightly */
                margin-bottom: 0.25rem !important;
            }
            .icon-circle {
                width: 45px !important; /* Shrink the top icon */
                height: 45px !important;
            }
            .icon-circle i {
                font-size: 1.2rem !important;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-3">
            <div class="mb-2">
                <!-- Added 'icon-circle' class here for height responsiveness -->
                <div class="icon-circle" style="width: 55px; height: 55px; background: rgba(99, 102, 241, 0.1); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;">
                    <i class="fas fa-user-check fa-lg text-primary"></i>
                </div>
            </div>
            <h2 class="text-primary mb-1" style="font-weight: 700;">Employee Login</h2>
            <p class="text-muted mb-0" style="font-size: 0.9rem;">Access your onboarding dashboard</p>
        </div>

        <!-- Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show d-flex align-items-center">
            <i class="fas fa-check-circle me-2"></i>
            <div class="flex-grow-1"><span th:text="${success}"></span></div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center">
            <i class="fas fa-exclamation-circle me-2"></i>
            <div class="flex-grow-1"><span th:text="${error}"></span></div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${info}" class="alert alert-info alert-dismissible fade show d-flex align-items-center">
            <i class="fas fa-info-circle me-2"></i>
            <div class="flex-grow-1"><span th:text="${info}"></span></div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Single Login Form -->
        <form th:action="@{/candidate/auth/login}" method="post" id="loginForm">
            <!-- Changed mb-4 to mb-3 -->
            <div class="mb-3">
                <label for="employeeId" class="form-label">Employee ID *</label>
                <input type="text" class="form-control" id="employeeId" name="employeeId"
                       placeholder="Enter your Employee ID" required th:value="${employeeId}">
                <div class="form-text">
                    <i class="fas fa-info-circle me-1"></i> Provided in your offer letter/email
                </div>
            </div>

            <!-- Changed mb-4 to mb-3 -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter your password">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                            style="background: rgba(255,255,255,0.05); border-color: var(--dark-border); color: #94a3b8;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-text">
                    <i class="fas fa-key me-1"></i> Leave empty if this is your first login
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="loginBtn">
                <i class="fas fa-sign-in-alt me-2"></i> Login
            </button>

            <div class="text-center pt-3 border-top" style="border-color: var(--dark-border);">
                <a href="/candidate/auth/forgot-password" class="text-primary text-decoration-none d-inline-flex align-items-center" style="font-size: 0.9rem;">
                    <i class="fas fa-question-circle me-1"></i> Forgot Password?
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const icon = this.querySelector('i');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    });

    // Form submission handling
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        const loginBtn = document.getElementById('loginBtn');
        const originalText = loginBtn.innerHTML;

        // Show loading state
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Logging in...';
        loginBtn.disabled = true;

        // Prevent double submission
        setTimeout(() => {
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalText;
        }, 3000);
    });

    // Auto-close alerts after 8 seconds
    setTimeout(() => {
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(alert => {
            const bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        });
    }, 8000);

    // Focus on employee ID field on load
    document.addEventListener('DOMContentLoaded', function() {
        const employeeIdField = document.getElementById('employeeId');
        if (employeeIdField && !employeeIdField.value) {
            employeeIdField.focus();
        }
    });
</script>
</body>
</html>
