# =============================================
# SERVER CONFIGURATION
# =============================================
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false
server.error.path=/error

# Server configuration for absolute URLs
server.host=http://localhost:8080

# =============================================
# DATABASE CONFIGURATION
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/hrms_db
spring.datasource.username=root
spring.datasource.password=sireesha@22.

# =============================================
# JPA & HIBERNATE CONFIGURATION
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# FILE UPLOAD CONFIGURATION - UPDATED
# =============================================
# File upload directory - ABSOLUTE PATH
file.upload-dir=C:/hrms/uploads

# File upload size limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# =============================================
# STATIC RESOURCE CONFIGURATION - UPDATED
# =============================================
# Enable static resource serving
spring.web.resources.add-mappings=true

# Configure static resource locations including ABSOLUTE uploads directory
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:///C:/hrms/uploads/

# Cache configuration for static resources
spring.web.resources.cache.period=3600
spring.web.resources.cache.cachecontrol.max-age=3600
spring.web.resources.cache.cachecontrol.must-revalidate=true

# Chain configuration for better resource handling
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# =============================================
# MIME TYPE CONFIGURATION FOR ALL FILE TYPES
# =============================================
# Ensure proper MIME types for file preview
spring.web.resources.chain.strategy.content.media-types.pdf=application/pdf
spring.web.resources.chain.strategy.content.media-types.doc=application/msword
spring.web.resources.chain.strategy.content.media-types.docx=application/vnd.openxmlformats-officedocument.wordprocessingml.document
spring.web.resources.chain.strategy.content.media-types.jpg=image/jpeg
spring.web.resources.chain.strategy.content.media-types.jpeg=image/jpeg
spring.web.resources.chain.strategy.content.media-types.png=image/png
spring.web.resources.chain.strategy.content.media-types.txt=text/plain

# =============================================
# THYMELEAF CONFIGURATION
# =============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Thymeleaf - disable cache during development
spring.thymeleaf.cache=false

# Spring Security - permit all for development (optional, use SecurityConfig instead)
# spring.security.enabled=false

# =============================================
# LOGGING CONFIGURATION - ENHANCED FOR DEBUGGING
# =============================================
logging.level.com.mentis.hrms=DEBUG
logging.level.com.mentis.hrms.controller=DEBUG
logging.level.com.mentis.hrms.service=DEBUG
logging.level.com.mentis.hrms.repository=DEBUG

# File upload debugging
logging.level.org.springframework.web.multipart=DEBUG
logging.level.org.apache.tomcat.util.http.fileupload=DEBUG

# Hibernate SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring framework logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.web.servlet=DEBUG

# Resource handling debugging
logging.level.org.springframework.web.resource=DEBUG

# File logging
logging.file.name=hrms.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# =============================================
# ERROR HANDLING CONFIGURATION
# =============================================
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-binding-errors=always
server.error.include-exception=false

# Debug mode
debug=true

# =============================================
# APPLICATION-SPECIFIC PROPERTIES
# =============================================
# Application name
spring.application.name=HRMS-Recruitment-System

# File upload configuration
app.upload.max-file-size=10485760
app.upload.allowed-file-types=pdf,doc,docx,txt,jpg,jpeg,png
app.upload.directory=C:/hrms/uploads

# File Preview settings
app.preview.enabled=true
app.preview.max-file-size=5242880
app.preview.supported-types=pdf,doc,docx,txt,jpg,jpeg,png

# =============================================
# JACKSON (JSON) CONFIGURATION
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=com.fasterxml.jackson.databind.util.StdDateFormat
spring.jackson.time-zone=Asia/Kolkata

# =============================================
# TOMCAT SERVER CONFIGURATION
# =============================================
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.background-processor-delay=30
server.tomcat.uri-encoding=UTF-8

# =============================================
# DATABASE CONNECTION POOL SETTINGS
# =============================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# =============================================
# SPRING MVC CONFIGURATION - CRITICAL FIX
# =============================================
# REMOVE or COMMENT OUT these lines if they exist:
# spring.mvc.static-path-pattern=/**
# spring.mvc.static-path-pattern=/static/**

# USE THIS INSTEAD - This is the default and works with controllers
spring.mvc.static-path-pattern=/static/**

# CRITICAL: Disable this setting - it's causing your 404 errors!
spring.mvc.throw-exception-if-no-handler-found=false

# Also disable this or set to false
spring.web.resources.add-mappings=true

# =============================================
# SECURITY (For file access)
# =============================================
# Disable security for static resources in development
spring.web.resources.add-mappings=true

# =============================================
# APPLICATION PERFORMANCE
# =============================================
spring.servlet.multipart.resolve-lazily=false

# =============================================
# VIEW RESOLVER CONFIGURATION
# =============================================
spring.mvc.view.prefix=classpath:/templates/
spring.mvc.view.suffix=.html

# Additional MIME type configurations for better file handling
spring.web.resources.chain.strategy.content.media-types.html=text/html
spring.web.resources.chain.strategy.content.media-types.htm=text/html
spring.web.resources.chain.strategy.content.media-types.css=text/css
spring.web.resources.chain.strategy.content.media-types.js=application/javascript

# Image MIME types
spring.web.resources.chain.strategy.content.media-types.svg=image/svg+xml
spring.web.resources.chain.strategy.content.media-types.gif=image/gif
spring.web.resources.chain.strategy.content.media-types.bmp=image/bmp
spring.web.resources.chain.strategy.content.media-types.webp=image/webp

# Document MIME types
spring.web.resources.chain.strategy.content.media-types.rtf=application/rtf
spring.web.resources.chain.strategy.content.media-types.odt=application/vnd.oasis.opendocument.text
spring.web.resources.chain.strategy.content.media-types.ods=application/vnd.oasis.opendocument.spreadsheet

