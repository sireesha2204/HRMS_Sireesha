<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Notifications - Menti's IT Solutions</title>

    <!-- =====  EXTERNAL LIBS  ===== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Same styles as employee-notifications.html with HR-specific adjustments */
        :root {
            --dark-bg: #121826;
            --dark-card: #1a2235;
            --dark-border: #2a3655;
            --dark-text: #e2e8f0;
            --dark-text-secondary: #94a3b8;
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #0ea5e9;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--dark-text);
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--dark-border);
            padding: 20px 0;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        .sidebar-header {
            padding: 0 24px 24px;
            border-bottom: 1px solid var(--dark-border);
            margin-bottom: 20px;
        }

        .sidebar-brand {
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu {
            padding: 0 16px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: var(--dark-text-secondary);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .menu-item:hover,
        .menu-item.active {
            background: var(--sidebar-hover);
            color: white;
            border-left-color: var(--primary);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-outline-primary {
            border: 1px solid var(--primary);
            color: var(--primary);
            background: transparent;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .notifications-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .notification-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
        }

        .notification-card.unread {
            border-left: 4px solid var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .notification-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 16px;
        }

        .icon-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .icon-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .icon-info { background: rgba(14, 165, 233, 0.1); color: var(--info); }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: var(--dark-text-secondary);
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
            }

            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="/dashboard" class="sidebar-brand">
                <i class="fas fa-users"></i>
                HR Dashboard
            </a>
        </div>

        <nav class="nav-menu">
            <a href="/dashboard" class="menu-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>

            <a th:href="@{/notifications/hr}" class="menu-item active">
                <i class="fas fa-bell"></i>
                <span>HR Notifications</span>
                <span class="badge bg-primary" th:text="${unreadCount}">0</span>
            </a>

            <a href="/dashboard/applications" class="menu-item">
                <i class="fas fa-file-alt"></i>
                <span>Applications</span>
            </a>

            <a href="/onboarding" class="menu-item">
                <i class="fas fa-clipboard-check"></i>
                <span>Onboarding</span>
            </a>

            <a href="/candidate/logout" class="menu-item">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">
                <i class="fas fa-bell"></i>
                HR Notifications
            </h1>

            <div class="header-actions">
                <span class="badge bg-primary" th:text="${unreadCount} + ' unread'"></span>
                <button class="btn-primary" onclick="markAllAsRead()">
                    <i class="fas fa-check-double"></i>
                    Mark All Read
                </button>
                <a href="/dashboard" class="btn-outline-primary">
                    <i class="fas fa-arrow-left"></i>
                    Back to Dashboard
                </a>
            </div>
        </div>

        <!-- NOTIFICATIONS LIST -->
        <div class="notifications-container" id="notificationsList">
            <div th:if="${notifications.empty}" class="empty-state">
                <i class="fas fa-bell-slash"></i>
                <h3>No notifications yet</h3>
                <p>When employees upload documents, they'll appear here</p>
            </div>

            <div th:each="notif : ${notifications}"
                 class="notification-card"
                 th:classappend="${notif.read} ? '' : 'unread'">
                <div class="notification-header">
                    <div class="notification-title">
                        <div th:class="'notification-icon ' +
                            ${notif.type == 'DOCUMENT_VERIFIED'} ? 'icon-success' :
                            (${notif.type == 'DOCUMENT_REJECTED'} ? 'icon-danger' : 'icon-info')">
                            <i th:class="${notif.type == 'DOCUMENT_VERIFIED'} ? 'fas fa-check-circle' :
                                    (${notif.type == 'DOCUMENT_REJECTED'} ? 'fas fa-times-circle' : 'fas fa-file-upload')"></i>
                        </div>
                        <span th:text="${notif.title}"></span>
                    </div>
                    <div class="notification-time" th:text="${#temporals.format(notif.createdAt, 'dd MMM yyyy HH:mm')}"></div>
                </div>

                <div class="notification-content" th:text="${notif.message}"></div>

                <div class="notification-actions">
                    <button th:if="${!notif.read}"
                            class="btn-outline-primary"
                            th:onclick="'markAsRead(' + ${notif.id} + ')'">
                        <i class="fas fa-check"></i>
                        Mark as Read
                    </button>

                    <a th:if="${notif.referenceId != null and notif.referenceType == 'DOCUMENT'}"
                       th:href="@{/onboarding/download/{id}(id=${notif.referenceId})}"
                       class="btn-primary">
                        <i class="fas fa-eye"></i>
                        View Document
                    </a>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    function markAsRead(notificationId) {
        fetch(`/notifications/api/${notificationId}/mark-read`, {
            method: 'POST'
        }).then(() => {
            location.reload();
        });
    }

    function markAllAsRead() {
        fetch('/notifications/api/mark-all-read', {
            method: 'POST'
        }).then(() => {
            location.reload();
        });
    }
</script>
</body>
</html>
