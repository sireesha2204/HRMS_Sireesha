<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="editModal" class="modal fade" id="editJobModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form th:action="@{/dashboard/updateJob}" method="post" th:object="${job}">
                <input type="hidden" th:field="*{id}"/>
                <div class="modal-header">
                    <h5 class="modal-title">Edit Job</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Department</label>
                            <select class="form-select" th:field="*{department}" required>
                                <option th:each="dept:${departments}" th:value="${dept.name}" th:text="${dept.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Job Type</label>
                            <select class="form-select" th:field="*{jobType}">
                                <option>Full-time</option><option>Part-time</option><option>Contract</option><option>Remote</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-control" th:field="*{location}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Experience Level</label>
                            <input type="text" class="form-control" th:field="*{experienceLevel}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Salary Range</label>
                            <input type="text" class="form-control" th:field="*{salaryRange}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Deadline</label>
                            <input type="date" class="form-control" th:field="*{applicationDeadline}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Active</label>
                            <select class="form-select" th:field="*{active}">
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">Short Description</label>
                            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
</html>
