<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --dark-text-secondary: #cbd5e1;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .forgot-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        .forgot-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .btn-primary {
            background: var(--primary);
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }
    </style>
</head>
<body>
<div class="forgot-container">
    <div class="forgot-card">
        <div class="text-center mb-4">
            <div class="mb-3">
                <div style="width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;">
                    <i class="fas fa-key fa-2x text-primary"></i>
                </div>
            </div>
            <h2 class="text-primary mb-2">Forgot Password</h2>
            <p class="text-muted">Enter your email to reset your password</p>
        </div>

        <!-- Success Message -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Reset Link Display -->
        <div th:if="${resetLink}" class="alert alert-info">
            <h6><i class="fas fa-link me-2"></i>Reset Link Generated:</h6>
            <div class="mt-2 p-2 bg-dark rounded">
                <code th:text="${resetLink}" id="resetLinkText" class="text-break"></code>
            </div>
            <button class="btn btn-outline-primary btn-sm mt-2" onclick="copyResetLink()">
                <i class="fas fa-copy me-1"></i> Copy Link
            </button>
        </div>

        <!-- Forgot Password Form -->
        <form th:action="@{/candidate/auth/forgot-password}" method="post">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" required
                       placeholder="Enter your registered email">
            </div>

            <div class="mb-3">
                <label class="form-label">Employee ID (Optional)</label>
                <input type="text" class="form-control" name="employeeId"
                       placeholder="Enter your employee ID if known">
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="fas fa-key me-2"></i> Send Reset Link
            </button>

            <div class="text-center">
                <a href="/candidate/login" class="text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function copyResetLink() {
        const resetLink = document.getElementById('resetLinkText').textContent;
        navigator.clipboard.writeText(resetLink).then(() => {
            alert('Reset link copied to clipboard!');
        });
    }
</script>
</body>
</html>
