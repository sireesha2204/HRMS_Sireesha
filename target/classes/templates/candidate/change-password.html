<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --primary: #6366f1;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .change-password-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .password-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 2rem;
        }
    </style>
</head>
<body>
<div class="change-password-container">
    <div class="password-card">
        <div class="text-center mb-4">
            <i class="fas fa-user-shield fa-3x text-primary mb-3"></i>
            <h2>Change Password</h2>
            <p class="text-muted" th:text="'For: ' + ${employee.firstName} + ' ' + ${employee.lastName}"></p>
        </div>

        <!-- Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}"></span>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/candidate/auth/change-password}" method="post">
            <div class="mb-3">
                <label class="form-label">Current Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" name="currentPassword" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword(this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" name="newPassword" required minlength="8">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword(this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <small class="text-muted">Minimum 8 characters</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm New Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" name="confirmPassword" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword(this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a th:href="@{/candidate/dashboard/{id}(id=${employee.employeeId})}"
                   class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-2"></i> Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i> Change Password
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePassword(button) {
        const input = button.parentElement.querySelector('input');
        const icon = button.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>

<body>
<!-- Add this script to redirect if not logged in -->
<script th:inline="javascript">
    /*<![CDATA[*/
    var userId = [[${session.userId}]];
    if (!userId) {
        window.location.href = '/candidate/auth/login?error=Please+login+first';
    }
    /*]]>*/
</script>
</body>
</html>
