<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer Letter Generated - Mentis HRMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --dark-bg: #121826;
            --dark-card: #1a2235;
            --dark-border: #2a3655;
            --dark-text: #e2e8f0;
            --primary: #6366f1;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--dark-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .success-container {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .success-icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 1.5rem;
        }

        .auto-open-msg {
            color: var(--dark-text);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .blocked-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: none;
        }

        .offer-details {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            text-align: left;
        }

        .offer-details p {
            margin: 0.5rem 0;
            color: var(--dark-text);
        }

        .offer-details strong {
            color: var(--success);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .countdown {
            color: var(--dark-text-secondary);
            font-size: 0.9rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="success-container">
    <i class="fas fa-check-circle success-icon"></i>
    <h2>Offer Letter Generated Successfully!</h2>

    <div class="offer-details">
        <p><strong>Candidate:</strong> <span th:text="${candidateName}">John Doe</span></p>
        <p><strong>Position:</strong> <span th:text="${designation}">Senior Developer</span></p>
        <p><strong>Offer ID:</strong> <span th:text="${offerId}">123</span></p>
    </div>

    <div class="auto-open-msg" id="autoOpenMsg">
        <i class="fas fa-sync fa-spin"></i>
        Opening offer letter in new tab<span id="dots">...</span>
    </div>

    <div class="blocked-msg" id="blockedMsg">
        <i class="fas fa-exclamation-triangle"></i>
        <strong>Popup blocked!</strong> Please allow popups for this site or click below.
    </div>

    <div class="action-buttons">
        <button class="btn btn-primary" onclick="viewOffer()">
            <i class="fas fa-eye"></i> View Offer Letter
        </button>
        <button class="btn btn-success" onclick="downloadOffer()">
            <i class="fas fa-download"></i> Download PDF
        </button>
        <a th:href="@{/dashboard/offer-candidates}" class="btn btn-secondary">
            <i class="fas fa-list"></i> Back to Offers
        </a>
    </div>

    <div class="countdown">
        Redirecting in <span id="countdown">5</span> seconds...
    </div>
</div>

<script>
    let offerId = [[${offerId}]];
    let countdown = 5;

    // Animate dots
    const dotsInterval = setInterval(() => {
        const dots = document.getElementById('dots');
        if (dots.textContent.length >= 3) dots.textContent = '';
        else dots.textContent += '.';
    }, 400);

    // Countdown timer
    const countdownInterval = setInterval(() => {
        countdown--;
        document.getElementById('countdown').textContent = countdown;
        if (countdown <= 0) {
            clearInterval(countdownInterval);
            clearInterval(dotsInterval);
        }
    }, 1000);

    // Auto-open PDF in new tab
    window.onload = function() {
        setTimeout(() => {
            const pdfUrl = '/dashboard/view-offer/' + offerId;
            const newTab = window.open(pdfUrl, '_blank');

            if (!newTab || newTab.closed || typeof newTab.closed == 'undefined') {
                document.getElementById('autoOpenMsg').style.display = 'none';
                document.getElementById('blockedMsg').style.display = 'block';
            } else {
                document.getElementById('autoOpenMsg').innerHTML =
                    '<i class="fas fa-check-circle"></i> Offer letter opened successfully!';
            }
        }, 1000);
    };

    function viewOffer() {
        window.open('/dashboard/view-offer/' + offerId, '_blank');
    }

    function downloadOffer() {
        window.location.href = '/dashboard/download-offer/' + offerId;
    }

    // Auto-redirect back to offer list
    setTimeout(() => {
        window.location.href = '/dashboard/offer-candidates';
    }, 7000);
</script>
</body>
</html>
