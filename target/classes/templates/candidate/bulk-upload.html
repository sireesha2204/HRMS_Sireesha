<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Upload - Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --primary: #6366f1;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', sans-serif;
        }

        .upload-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .upload-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .document-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .document-item:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body>
<div class="upload-container">
    <div class="upload-card">
        <div class="text-center mb-4">
            <h2 class="text-primary">
                <i class="fas fa-cloud-upload-alt me-2"></i>Bulk Document Upload
            </h2>
            <p class="text-muted" th:text="'For: ' + ${employee.firstName} + ' ' + ${employee.lastName}"></p>
            <div class="badge bg-warning" th:text="${pendingDocuments} + ' Pending Documents'"></div>
        </div>

        <div th:if="${pendingDocuments == 0}" class="text-center py-5">
            <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
            <h4 class="text-success">All Documents Uploaded!</h4>
            <p class="text-muted">You have no pending documents to upload.</p>
            <a th:href="@{/candidate/dashboard/{empId}(empId=${employee.employeeId})}"
               class="btn btn-primary">Go to Dashboard</a>
        </div>

        <div th:if="${pendingDocuments > 0}">
            <form th:action="@{#}" method="post" enctype="multipart/form-data" id="bulkUploadForm">
                <div th:each="doc, iterStat : ${documents}" class="document-item">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <h6 class="mb-1" th:text="${doc.documentName}"></h6>
                            <small class="text-muted" th:text="${doc.description}"></small>
                            <div class="mt-2">
                                <span th:if="${doc.mandatory}" class="badge bg-danger">Mandatory</span>
                                <span th:unless="${doc.mandatory}" class="badge bg-secondary">Optional</span>
                                <span th:if="${doc.status == 'REJECTED'}" class="badge bg-warning ms-2">Re-upload Required</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="input-group">
                                <input type="file"
                                       class="form-control"
                                       th:id="'file_' + ${doc.documentType}"
                                       th:name="'file_' + ${doc.documentType}"
                                       accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
                                <input type="hidden" th:name="'type_' + ${doc.documentType}" th:value="${doc.documentType}">
                            </div>
                            <small class="text-muted">Max 5MB - PDF, JPG, PNG, DOC</small>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <div class="form-group mb-3">
                        <label for="notes" class="form-label">Additional Notes (Optional)</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"
                                  placeholder="Any additional information for all documents..."></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/candidate/dashboard/{empId}(empId=${employee.employeeId})}"
                           class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-upload me-2"></i> Upload All Documents
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Handle bulk upload form submission
    document.getElementById('bulkUploadForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const formData = new FormData(this);
        const employeeId = '[[${employee.employeeId}]]';

        // Show loading
        const submitBtn = this.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Uploading...';
        submitBtn.disabled = true;

        // Upload each document individually
        let uploadPromises = [];
        let uploadedCount = 0;

        // Collect all file inputs
        const fileInputs = this.querySelectorAll('input[type="file"]');

        fileInputs.forEach(input => {
            if (input.files.length > 0) {
                const file = input.files[0];
                const docType = input.name.replace('file_', '');
                const formDataSingle = new FormData();
                formDataSingle.append('documentFile', file);
                formDataSingle.append('documentType', docType);
                formDataSingle.append('notes', document.getElementById('notes').value);

                uploadPromises.push(
                    fetch(`/candidate/upload/${employeeId}/${docType}`, {
                        method: 'POST',
                        body: formDataSingle
                    })
                    .then(response => {
                        uploadedCount++;
                        updateProgress(uploadedCount, fileInputs.length);
                        return response;
                    })
                );
            }
        });

        // Execute all uploads
        Promise.all(uploadPromises)
            .then(responses => {
                alert(`Successfully uploaded ${uploadedCount} document(s)!`);
                window.location.href = `/candidate/dashboard/${employeeId}`;
            })
            .catch(error => {
                console.error('Upload error:', error);
                alert('Some documents failed to upload. Please try again.');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
    });

    function updateProgress(current, total) {
        const progress = Math.round((current / total) * 100);
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.innerHTML = `<i class="fas fa-spinner fa-spin me-2"></i> Uploading... ${progress}%`;
    }
</script>
</body>
</html>
