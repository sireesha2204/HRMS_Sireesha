<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Credentials - Candidate Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --dark-text-secondary: #cbd5e1;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .credentials-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        .credentials-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            color: var(--dark-text);
        }

        .form-control:read-only {
            background: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            cursor: not-allowed;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-label {
            font-weight: 500;
            color: var(--dark-text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline-secondary {
            background: transparent;
            border: 1px solid var(--dark-border);
            color: var(--dark-text-secondary);
            transition: all 0.2s ease;
        }

        .btn-outline-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #64748b;
            color: var(--dark-text);
        }

        .password-strength {
            height: 4px;
            background: var(--dark-border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak { background: var(--danger); }
        .strength-medium { background: var(--warning); }
        .strength-strong { background: var(--success); }

        .form-text {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 16px 12px;
            padding-right: 2.5rem;
        }

        .alert {
            border-radius: 8px;
            border: none;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid var(--danger);
            color: #fca5a5;
        }

        @media (max-width: 576px) {
            .credentials-card {
                padding: 1.5rem;
            }

            body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<div class="credentials-container">
    <div class="credentials-card">
        <div class="text-center mb-4">
            <div class="mb-3">
                <div style="width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;">
                    <i class="fas fa-user-lock fa-2x text-primary"></i>
                </div>
            </div>
            <h2 class="text-primary mb-2" style="font-weight: 700;">Create Your Credentials</h2>
            <p class="text-muted" style="font-size: 0.95rem;">
                Welcome, <span th:text="${employeeName}" class="text-primary fw-semibold"></span>!
                Create a secure password for future logins.
            </p>
        </div>

        <!-- Error Messages -->
        <div th:if="${error}" class="alert alert-danger d-flex align-items-center">
            <i class="fas fa-exclamation-circle me-2" style="font-size: 1.1rem;"></i>
            <div>
                <span th:text="${error}"></span>
            </div>
        </div>

        <form th:action="@{/candidate/create-credentials/{employeeId}(employeeId=${employeeId})}" method="post" id="credentialsForm">
            <div class="mb-3">
                <label class="form-label">Employee ID</label>
                <input type="text" class="form-control" th:value="${employeeId}" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" th:value="${email}" readonly>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Create Password *</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter password (minimum 8 characters)" required
                           onkeyup="checkPasswordStrength()">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                            style="border-color: var(--dark-border); color: #94a3b8;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="password-strength-bar" id="passwordStrengthBar"></div>
                </div>
                <div class="form-text" id="passwordStrengthText">Password strength indicator</div>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password *</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           placeholder="Confirm your password" required
                           onkeyup="checkPasswordMatch()">
                    <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword"
                            style="border-color: var(--dark-border); color: #94a3b8;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-text" id="passwordMatchText">Passwords must match</div>
            </div>

            <div class="mb-3">
                <label for="securityQuestion" class="form-label">Security Question *</label>
                <select class="form-control" id="securityQuestion" name="securityQuestion" required>
                    <option value="">Select a security question</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                    <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                    <option value="What was your first pet's name?">What was your first pet's name?</option>
                    <option value="What was your first school's name?">What was your first school's name?</option>
                    <option value="What is your favorite book?">What is your favorite book?</option>
                    <option value="What was the make of your first car?">What was the make of your first car?</option>
                    <option value="What is your favorite childhood friend's name?">What is your favorite childhood friend's name?</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="securityAnswer" class="form-label">Security Answer *</label>
                <input type="text" class="form-control" id="securityAnswer" name="securityAnswer"
                       placeholder="Enter your answer" required>
                <div class="form-text">
                    <i class="fas fa-shield-alt me-1"></i>
                    This will be used for account recovery. Make it memorable.
                </div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg py-2" id="submitBtn">
                    <i class="fas fa-user-check me-2"></i>Create Credentials
                </button>
                <a th:href="@{/candidate/onboarding/{employeeId}(employeeId=${employeeId})}"
                   class="btn btn-outline-secondary py-2">
                    Skip for now
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    // Toggle password visibility
    function setupPasswordToggle(inputId, buttonId) {
        const button = document.getElementById(buttonId);
        const input = document.getElementById(inputId);

        button.addEventListener('click', function() {
            const icon = this.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    }

    setupPasswordToggle('password', 'togglePassword');
    setupPasswordToggle('confirmPassword', 'toggleConfirmPassword');

    // Password strength checker
    function checkPasswordStrength() {
        const password = document.getElementById('password').value;
        const strengthBar = document.getElementById('passwordStrengthBar');
        const strengthText = document.getElementById('passwordStrengthText');

        let strength = 0;
        let text = '';
        let barClass = '';
        let barWidth = 0;

        if (password.length >= 8) strength++;
        if (password.length >= 12) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/\d/)) strength++;
        if (password.match(/[^a-zA-Z\d]/)) strength++;

        switch(true) {
            case (password.length === 0):
                text = 'Enter a password';
                barClass = '';
                barWidth = 0;
                break;
            case (strength <= 2):
                text = 'Weak password - Add uppercase, numbers, or symbols';
                barClass = 'strength-weak';
                barWidth = '33%';
                break;
            case (strength === 3):
                text = 'Medium password';
                barClass = 'strength-medium';
                barWidth = '66%';
                break;
            case (strength >= 4):
                text = 'Strong password ✓';
                barClass = 'strength-strong';
                barWidth = '100%';
                break;
        }

        strengthBar.className = 'password-strength-bar ' + barClass;
        strengthBar.style.width = barWidth;
        strengthText.textContent = text;
        strengthText.className = 'form-text ' +
            (strength >= 4 ? 'text-success' :
             strength >= 3 ? 'text-warning' :
             password.length > 0 ? 'text-danger' : 'text-muted');
    }

    // Password match checker
    function checkPasswordMatch() {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const matchText = document.getElementById('passwordMatchText');

        if (!password) {
            matchText.textContent = 'Enter password first';
            matchText.className = 'form-text text-muted';
            return;
        }

        if (confirmPassword.length === 0) {
            matchText.textContent = 'Confirm your password';
            matchText.className = 'form-text text-muted';
            return;
        }

        if (password === confirmPassword) {
            matchText.textContent = '✓ Passwords match';
            matchText.className = 'form-text text-success';
        } else {
            matchText.textContent = '✗ Passwords do not match';
            matchText.className = 'form-text text-danger';
        }
    }

    // Form submission handling
    document.getElementById('credentialsForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const securityQuestion = document.getElementById('securityQuestion').value;
        const securityAnswer = document.getElementById('securityAnswer').value;
        const submitBtn = document.getElementById('submitBtn');

        // Validation
        if (password.length < 8) {
            e.preventDefault();
            alert('Password must be at least 8 characters long.');
            document.getElementById('password').focus();
            return;
        }

        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Passwords do not match.');
            document.getElementById('confirmPassword').focus();
            return;
        }

        if (!securityQuestion) {
            e.preventDefault();
            alert('Please select a security question.');
            document.getElementById('securityQuestion').focus();
            return;
        }

        if (!securityAnswer.trim()) {
            e.preventDefault();
            alert('Please enter a security answer.');
            document.getElementById('securityAnswer').focus();
            return;
        }

        // Disable button and show loading
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Creating...';
    });

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        checkPasswordStrength();
        checkPasswordMatch();
        document.getElementById('password').focus();
    });
</script>
</body>
</html>
