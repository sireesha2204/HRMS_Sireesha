<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Password - Candidate Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --dark-text-secondary: #cbd5e1;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .password-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
        }

        .password-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            color: var(--dark-text);
        }

        .form-control:read-only {
            background: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            cursor: not-allowed;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-label {
            font-weight: 500;
            color: var(--dark-text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline-secondary {
            background: transparent;
            border: 1px solid var(--dark-border);
            color: var(--dark-text-secondary);
            transition: all 0.2s ease;
        }

        .btn-outline-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #64748b;
            color: var(--dark-text);
        }

        .password-strength {
            height: 4px;
            background: var(--dark-border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak { background: var(--danger); }
        .strength-medium { background: var(--warning); }
        .strength-strong { background: var(--success); }

        .alert {
            border-radius: 8px;
            border: none;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border-left: 4px solid var(--success);
            color: #a7f3d0;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid var(--danger);
            color: #fca5a5;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.15);
            border-left: 4px solid var(--info);
            color: #93c5fd;
        }

        .form-text {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .user-info-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .user-info-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
        }

        .user-info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--dark-text-secondary);
            font-weight: 500;
        }

        .info-value {
            color: var(--primary);
            font-weight: 600;
        }

        .requirements-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            margin-bottom: 4px;
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .requirement-icon {
            font-size: 0.7rem;
            transition: all 0.3s ease;
        }

        .requirement-met {
            color: var(--success);
        }

        .requirement-unmet {
            color: #94a3b8;
        }

        .requirement-text {
            font-size: 0.75rem;
        }

        @media (max-width: 576px) {
            .password-card {
                padding: 1.5rem;
            }

            body {
                padding: 15px;
            }

            .user-info-box {
                padding: 1rem;
            }

            .requirements-container {
                gap: 8px;
            }

            .requirement-item {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 380px) {
            .requirements-container {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
<div class="password-container">
    <div class="password-card">
        <div class="text-center mb-4">
            <div class="mb-3">
                <div style="width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;">
                    <i class="fas fa-user-shield fa-2x text-primary"></i>
                </div>
            </div>
            <h2 class="text-primary mb-2" style="font-weight: 700;">Create Your Password</h2>
            <p class="text-muted" style="font-size: 0.95rem;">Secure your account with a strong password</p>
        </div>

        <!-- User Information Box -->
        <div class="user-info-box">
            <div class="user-info-item">
                <span class="info-label">Employee ID:</span>
                <span class="info-value" th:text="${employeeId}"></span>
            </div>
            <div class="user-info-item" th:if="${employeeName}">
                <span class="info-label">Name:</span>
                <span class="info-value" th:text="${employeeName}"></span>
            </div>
            <div class="user-info-item" th:if="${email}">
                <span class="info-label">Email:</span>
                <span class="info-value" th:text="${email}"></span>
            </div>
        </div>

        <!-- Success Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show d-flex align-items-center">
            <i class="fas fa-check-circle me-2" style="font-size: 1.1rem;"></i>
            <div class="flex-grow-1">
                <span th:text="${success}"></span>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Error Messages -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center">
            <i class="fas fa-exclamation-circle me-2" style="font-size: 1.1rem;"></i>
            <div class="flex-grow-1">
                <span th:text="${error}"></span>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/candidate/create-password}" method="post" id="passwordForm">
            <input type="hidden" name="employeeId" th:value="${employeeId}">

            <div class="mb-3">
                <label for="password" class="form-label">New Password *</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter new password (min. 8 characters)" required
                           onkeyup="checkPasswordStrength()">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                            style="border-color: var(--dark-border); color: #94a3b8;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="password-strength-bar" id="passwordStrengthBar"></div>
                </div>
                <div class="form-text mb-2" id="passwordStrengthText">Password strength indicator</div>

                <!-- Single line password requirements -->
                <div class="requirements-container" id="requirementsContainer">
                    <div class="requirement-item" id="req-length">
                        <i class="fas fa-circle requirement-icon"></i>
                        <span class="requirement-text">8+ chars</span>
                    </div>
                    <div class="requirement-item" id="req-uppercase">
                        <i class="fas fa-circle requirement-icon"></i>
                        <span class="requirement-text">A-Z</span>
                    </div>
                    <div class="requirement-item" id="req-lowercase">
                        <i class="fas fa-circle requirement-icon"></i>
                        <span class="requirement-text">a-z</span>
                    </div>
                    <div class="requirement-item" id="req-number">
                        <i class="fas fa-circle requirement-icon"></i>
                        <span class="requirement-text">0-9</span>
                    </div>
                    <div class="requirement-item" id="req-special">
                        <i class="fas fa-circle requirement-icon"></i>
                        <span class="requirement-text">!@#$</span>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirm Password *</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           placeholder="Re-enter new password" required
                           onkeyup="checkPasswordMatch()">
                    <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword"
                            style="border-color: var(--dark-border); color: #94a3b8;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-text" id="passwordMatchText">Passwords must match</div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg py-2" id="submitBtn">
                    <i class="fas fa-user-check me-2"></i> Create Password
                </button>
                <a href="/candidate/login" class="btn btn-outline-secondary py-2">
                    <i class="fas fa-arrow-left me-2"></i> Back to Login
                </a>
            </div>
        </form>

        <div class="mt-4 pt-3 border-top" style="border-color: var(--dark-border);">
            <div class="text-center">
                <small class="text-muted">
                    <i class="fas fa-info-circle me-1"></i>
                    After creating your password, you'll be redirected to login
                </small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Toggle password visibility
    function setupPasswordToggle(inputId, buttonId) {
        const button = document.getElementById(buttonId);
        const input = document.getElementById(inputId);

        button.addEventListener('click', function() {
            const icon = this.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    }

    setupPasswordToggle('password', 'togglePassword');
    setupPasswordToggle('confirmPassword', 'toggleConfirmPassword');

    // Update requirements list
    function updateRequirements(password) {
        const requirements = {
            length: password.length >= 8,
            uppercase: /[A-Z]/.test(password),
            lowercase: /[a-z]/.test(password),
            number: /\d/.test(password),
            special: /[^a-zA-Z\d]/.test(password)
        };

        // Update requirement indicators
        const requirementItems = ['length', 'uppercase', 'lowercase', 'number', 'special'];

        requirementItems.forEach(req => {
            const element = document.getElementById(`req-${req}`);
            const icon = element.querySelector('i');
            const text = element.querySelector('.requirement-text');

            if (requirements[req]) {
                element.classList.add('requirement-met');
                element.classList.remove('requirement-unmet');
                icon.classList.remove('fa-circle');
                icon.classList.add('fa-check-circle');
                icon.style.color = 'var(--success)';
                text.style.color = 'var(--success)';
            } else {
                element.classList.add('requirement-unmet');
                element.classList.remove('requirement-met');
                icon.classList.remove('fa-check-circle');
                icon.classList.add('fa-circle');
                icon.style.color = '#94a3b8';
                text.style.color = '#94a3b8';
            }
        });

        return requirements;
    }

    // Password strength checker
    function checkPasswordStrength() {
        const password = document.getElementById('password').value;
        const strengthBar = document.getElementById('passwordStrengthBar');
        const strengthText = document.getElementById('passwordStrengthText');

        // Update requirements
        const requirements = updateRequirements(password);

        // Calculate strength
        let strength = 0;
        Object.values(requirements).forEach(req => {
            if (req) strength++;
        });

        let text = '';
        let barClass = '';
        let barWidth = 0;

        switch(true) {
            case (password.length === 0):
                text = 'Enter a password';
                barClass = '';
                barWidth = 0;
                break;
            case (strength <= 2):
                text = 'Weak password';
                barClass = 'strength-weak';
                barWidth = '25%';
                break;
            case (strength === 3):
                text = 'Fair password';
                barClass = 'strength-medium';
                barWidth = '50%';
                break;
            case (strength === 4):
                text = 'Good password';
                barClass = 'strength-medium';
                barWidth = '75%';
                break;
            case (strength >= 5):
                text = 'Strong password ✓';
                barClass = 'strength-strong';
                barWidth = '100%';
                break;
        }

        strengthBar.className = 'password-strength-bar ' + barClass;
        strengthBar.style.width = barWidth;
        strengthText.textContent = text;
        strengthText.className = 'form-text ' +
            (strength >= 4 ? 'text-success' :
             strength >= 2 ? 'text-warning' :
             password.length > 0 ? 'text-danger' : 'text-muted');
    }

    // Password match checker
    function checkPasswordMatch() {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const matchText = document.getElementById('passwordMatchText');

        if (!password) {
            matchText.textContent = 'Enter password first';
            matchText.className = 'form-text text-muted';
            return;
        }

        if (confirmPassword.length === 0) {
            matchText.textContent = 'Confirm your password';
            matchText.className = 'form-text text-muted';
            return;
        }

        if (password === confirmPassword) {
            matchText.textContent = '✓ Passwords match';
            matchText.className = 'form-text text-success';
        } else {
            matchText.textContent = '✗ Passwords do not match';
            matchText.className = 'form-text text-danger';
        }
    }

    // Form submission handling
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const submitBtn = document.getElementById('submitBtn');

        // Check password requirements
        const requirements = updateRequirements(password);
        const basicRequirements = requirements.length && requirements.uppercase &&
                                 requirements.lowercase && requirements.number;

        // Validation
        if (!basicRequirements) {
            e.preventDefault();
            alert('Password must meet all basic requirements: at least 8 characters, uppercase, lowercase, and numbers.');
            document.getElementById('password').focus();
            return;
        }

        if (password.length < 8) {
            e.preventDefault();
            alert('Password must be at least 8 characters long.');
            document.getElementById('password').focus();
            return;
        }

        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Passwords do not match.');
            document.getElementById('confirmPassword').focus();
            return;
        }

        // Disable button and show loading
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Creating Password...';
    });

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        checkPasswordStrength();
        checkPasswordMatch();
        document.getElementById('password').focus();

        // Auto-close alerts after 8 seconds
        setTimeout(() => {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                if (alert.classList.contains('alert-dismissible')) {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }
            });
        }, 8000);
    });
</script>
</body>
</html>
