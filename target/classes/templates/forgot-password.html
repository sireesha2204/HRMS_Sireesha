<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Candidate Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>">
    <style>
        :root {
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-border: #334155;
            --dark-text: #f8fafc;
            --dark-text-secondary: #cbd5e1;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        body {
            background: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .forgot-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }

        .forgot-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            color: var(--dark-text);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-label {
            font-weight: 500;
            color: var(--dark-text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline-primary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            transition: all 0.2s ease;
        }

        .btn-outline-primary:hover {
            background: var(--primary);
            color: white;
        }

        .alert {
            border-radius: 8px;
            border: none;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border-left: 4px solid var(--success);
            color: #a7f3d0;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid var(--danger);
            color: #fca5a5;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.15);
            border-left: 4px solid var(--info);
            color: #93c5fd;
        }

        .btn-close-white {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        .reset-link-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            word-break: break-all;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .copy-btn {
            margin-top: 0.75rem;
            font-size: 0.9rem;
        }

        .form-text {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        @media (max-width: 576px) {
            .forgot-card {
                padding: 1.5rem;
            }

            body {
                padding: 15px;
            }

            .reset-link-box {
                font-size: 0.8rem;
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
<div class="forgot-container">
    <div class="forgot-card">
        <div class="text-center mb-4">
            <div class="mb-3">
                <div style="width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;">
                    <i class="fas fa-key fa-2x text-primary"></i>
                </div>
            </div>
            <h2 class="text-primary mb-2" style="font-weight: 700;">Reset Your Password</h2>
            <p class="text-muted" style="font-size: 0.95rem;">Enter your email or employee ID to generate a reset link</p>
        </div>

        <!-- Success Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show d-flex align-items-center">
            <i class="fas fa-check-circle me-2" style="font-size: 1.1rem;"></i>
            <div class="flex-grow-1">
                <span th:text="${successMessage}"></span>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Reset Link Display -->
        <div th:if="${resetLink}" class="alert alert-info">
            <h6 class="mb-2 d-flex align-items-center">
                <i class="fas fa-link me-2"></i>Reset Link Generated:
            </h6>
            <div class="reset-link-box">
                <code th:text="${resetLink}" id="resetLinkText"></code>
            </div>
            <button class="btn btn-outline-primary copy-btn" onclick="copyResetLink()" id="copyBtn">
                <i class="fas fa-copy me-1"></i> Copy Link
            </button>
            <div class="mt-2">
                <small class="text-muted d-flex align-items-center">
                    <i class="fas fa-info-circle me-1"></i>
                    Copy this link and open in browser. Link expires in 24 hours.
                </small>
            </div>
        </div>

        <!-- Error Messages -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center">
            <i class="fas fa-exclamation-circle me-2" style="font-size: 1.1rem;"></i>
            <div class="flex-grow-1">
                <span th:text="${error}"></span>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/candidate/auth/forgot-password}" method="post" id="forgotForm">
            <div class="mb-4">
                <label class="form-label">Email Address *</label>
                <input type="email" class="form-control" name="email" required
                       placeholder="Enter your registered email" th:value="${email}">
                <div class="form-text">
                    <i class="fas fa-envelope me-1"></i>
                    We'll send the reset link to this email
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Employee ID (Optional)</label>
                <input type="text" class="form-control" name="employeeId"
                       placeholder="Enter your employee ID (if known)" th:value="${employeeId}">
                <div class="form-text">
                    <i class="fas fa-id-card me-1"></i>
                    Provide either email or employee ID
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="submitBtn">
                <i class="fas fa-key me-2"></i> Generate Reset Link
            </button>

            <div class="text-center pt-3 border-top" style="border-color: var(--dark-border);">
                <a href="/candidate/login" class="text-primary text-decoration-none d-inline-flex align-items-center">
                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Copy reset link to clipboard
    function copyResetLink() {
        const resetLinkElement = document.getElementById('resetLinkText');
        if (resetLinkElement) {
            const resetLink = resetLinkElement.textContent;
            const copyBtn = document.getElementById('copyBtn');
            const originalHtml = copyBtn.innerHTML;

            // Use modern Clipboard API
            navigator.clipboard.writeText(resetLink)
                .then(() => {
                    // Show success message
                    copyBtn.innerHTML = '<i class="fas fa-check me-1"></i> Copied!';
                    copyBtn.classList.remove('btn-outline-primary');
                    copyBtn.classList.add('btn-success');

                    // Revert after 2 seconds
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHtml;
                        copyBtn.classList.remove('btn-success');
                        copyBtn.classList.add('btn-outline-primary');
                    }, 2000);
                })
                .catch(err => {
                    console.error('Failed to copy: ', err);
                    // Fallback for older browsers
                    const textArea = document.createElement('textarea');
                    textArea.value = resetLink;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);

                    // Show success message even with fallback
                    copyBtn.innerHTML = '<i class="fas fa-check me-1"></i> Copied!';
                    copyBtn.classList.remove('btn-outline-primary');
                    copyBtn.classList.add('btn-success');

                    setTimeout(() => {
                        copyBtn.innerHTML = originalHtml;
                        copyBtn.classList.remove('btn-success');
                        copyBtn.classList.add('btn-outline-primary');
                    }, 2000);
                });
        }
    }

    // Form submission handling
    document.getElementById('forgotForm').addEventListener('submit', function(e) {
        const submitBtn = document.getElementById('submitBtn');
        const originalText = submitBtn.innerHTML;

        // Show loading state
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Generating...';
        submitBtn.disabled = true;

        // Prevent double submission
        setTimeout(() => {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }, 3000);
    });

    // Auto-close alerts after 10 seconds
    setTimeout(() => {
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(alert => {
            if (alert.classList.contains('alert-dismissible')) {
                const bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            }
        });
    }, 10000);

    // Focus on email field on load
    document.addEventListener('DOMContentLoaded', function() {
        const emailField = document.querySelector('input[name="email"]');
        if (emailField && !emailField.value) {
            emailField.focus();
        }
    });
</script>
</body>
</html>
